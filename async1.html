<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="txt">async is turning to...</p>
    <button onclick="fakeAxios()">click here to change</button>
</body>

<script>
    text = document.getElementById("txt")
    function fakeAxios(){

        return new Promise(function (resolve){
            setTimeout(()=>{
                resolve('data recieved')

            },2000)
        })
    }

    fakeAxios().then((data)=>{
        text.innerHTML = data;
        console.log(data)
    })



</script>
</html>
